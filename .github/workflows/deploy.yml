name: Deployment

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Where to deploy? Only build (build), deploy to test PyPI (test), or deploy to PyPI (prod).'
        required: true
        type: choice
        default: 'test'
        options:
          - build
          - test
          - prod

jobs:
  build:
    if: github.repository == 'facebookresearch/egoblur'
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    name: Build and verify (${{ matrix.os }})
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Verify install from wheel
        env:
          PIP_EXTRA_INDEX_URL: "https://download.pytorch.org/whl/cpu"
        run: |
          python -m venv .venv-verify
          . .venv-verify/bin/activate
          pip install --upgrade pip
          pip install dist/*.whl
          egoblur-gen1 -h
          egoblur-gen2 -h
          egoblur-vrs-blur -h

      - uses: actions/upload-artifact@v5
        if: matrix.os == 'ubuntu-latest'
        with:
          name: python-package-distributions
          path: dist/

  publish-test-pypi:
    runs-on: ubuntu-latest
    needs: build
    if: github.event.inputs.deploy == 'test'
    environment: test-pypi
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          name: python-package-distributions
          path: dist

      - name: Display artifacts
        run: ls -la dist/

      - name: Publish to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
          verbose: true

  publish-pypi:
    runs-on: ubuntu-latest
    needs: build
    if: github.event.inputs.deploy == 'prod' && startsWith(github.ref, 'refs/tags')
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          name: python-package-distributions
          path: dist

      - name: Display artifacts
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
