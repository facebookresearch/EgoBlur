name: Deployment

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Where to deploy? Only build (build), deploy to test PyPI (test), or deploy to PyPI (prod).'
        required: true
        type: choice
        default: 'test'
        options:
          - build
          - test
          - prod

jobs:
  build-sdist:
    if: github.repository == 'facebookresearch/egoblur'
    runs-on: ubuntu-latest
    name: Build source distribution
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist

      - name: Verify install from sdist
        env:
          PIP_EXTRA_INDEX_URL: "https://download.pytorch.org/whl/cpu https://test.pypi.org/simple/"
        run: |
          python -m venv .venv-verify
          . .venv-verify/bin/activate
          pip install --upgrade pip
          pip install dist/*.tar.gz
          egoblur-gen2 -h
          egoblur-vrs-blur -h

      - uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/*.tar.gz

  publish:
    runs-on: ubuntu-latest
    needs: build-sdist
    if: github.event.inputs.deploy != 'build'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist

      - name: Display artifacts
        run: ls -la dist/

      - name: Publish to Test PyPI
        if: github.event.inputs.deploy == 'test'
        uses: pypa/gh-action-pypi-publish@v1.4.2
        with:
          user: __token__
          password: ${{ secrets.TEST_PYPI_TOKEN }}
          repository_url: https://test.pypi.org/legacy/
          skip_existing: true
          verbose: true

      - name: Publish to PyPI
        if: github.event.inputs.deploy == 'prod' && startsWith(github.ref, 'refs/tags')
        uses: pypa/gh-action-pypi-publish@v1.4.2
        with:
          user: __token__
          password: ${{ secrets.PYPI_TOKEN }}
          verbose: true
